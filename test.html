<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>mpyochats Test Client</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #1e1e1e;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    background: #2b2b2b;
    padding: 10px;
}

#messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.message {
    background: #2b2b2b;
    padding: 8px;
    margin-bottom: 6px;
    border-radius: 6px;
    word-wrap: break-word;
}

#bottom {
    display: flex;
    gap: 8px;
    padding: 10px;
    background: #2b2b2b;
}

input, select {
    background: #3a3a3a;
    color: white;
    border: none;
    padding: 8px;
    border-radius: 4px;
}

#msg {
    flex: 1;
}

button {
    background: #4b7bec;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background: #5c89f2;
}
</style>
</head>

<body>

<header>
    <div id="server">Connecting...</div>
    <br>
    Channel:
    <select id="channel"></select>
</header>

<div id="messages"></div>

<div id="bottom">
    <input id="msg" placeholder="Type a message...">
    <button id="send">Send</button>
</div>

<script>

const username = prompt("Username?") || ("Guest" + Math.floor(Math.random()*10000));

let currentChannel = "";

const ws = new WebSocket(
    (location.protocol === "https:" ? "wss://" : "ws://") +
    location.host +
    "/"
);

const messages = document.getElementById("messages");
const channelSelect = document.getElementById("channel");
const input = document.getElementById("msg");

function send(packet) {
    ws.send(JSON.stringify(packet));
}

function addMessage(text) {
    const div = document.createElement("div");
    div.className = "message";
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function loadMessages() {
    if (!currentChannel) return;

    send({
        cmd: "messages_get",
        channel: currentChannel,
        limit: 100
    });
}

function sendMessage() {
    if (!input.value.trim())
        return;

    send({
        cmd: "message_new",
        channel: currentChannel,
        content: `${username} - ${input.value}`
    });

    input.value = "";
}

document.getElementById("send").onclick = sendMessage;

input.addEventListener("keydown", e => {
    if (e.key === "Enter")
        sendMessage();
});

channelSelect.onchange = () => {
    currentChannel = channelSelect.value;
    messages.innerHTML = "";
    loadMessages();
};

ws.onopen = () => {
    addMessage("Connected.");

    send({
        cmd: "channels_get"
    });

    send({
        cmd: "users_list"
    });
};

ws.onmessage = e => {

    const data = JSON.parse(e.data);

    console.log(data);

    switch(data.cmd) {

        case "server_update":
            document.getElementById("server").textContent =
                `${data.name}`;
            break;

        case "channels_get":

            channelSelect.innerHTML = "";

            for (const channel of data.val) {

                const option = document.createElement("option");

                let value;
                let label;

                if (typeof channel === "string") {
                    value = channel;
                    label = channel;
                } else {
                    value = channel.id || channel.name || channel.channel || JSON.stringify(channel);
                    label = channel.name || channel.id || channel.channel || JSON.stringify(channel);
                }

                option.value = value;
                option.textContent = label;

                channelSelect.appendChild(option);
            }

            if (channelSelect.options.length > 0) {
                currentChannel = channelSelect.options[0].value;
                channelSelect.value = currentChannel;
                loadMessages();
            }

            break;

        case "messages_get":

            messages.innerHTML = "";

            for (const msg of data.messages) {
                addMessage(msg.content);
            }

            break;

        case "message_new":

            if (data.channel !== currentChannel)
                return;

            addMessage(data.message.content);

            break;

        case "message_delete":
            addMessage("(A message was deleted)");
            break;

        case "users_list":
            console.log("Users:", data.users);
            break;

        case "error":
            alert(data.val);
            break;
    }

};

ws.onclose = () => {
    addMessage("Disconnected.");
};

</script>

</body>
</html>
