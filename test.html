<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>mpyochats</title>

<style>
:root {
    --bg: #0b0e14;
    --panel: #121826;
    --panel2: #0f1420;
    --accent: #7aa2ff;
    --text: #e8ecff;
    --muted: #8b93a7;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, sans-serif;
    height: 100vh;
    display: flex;
}

/* sidebar */
#sidebar {
    width: 260px;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    padding: 10px;
    border-right: 1px solid #1f2740;
}

#status {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
}

/* chat */
#chat {
    flex: 1;
    display: flex;
    flex-direction: column;
}

#messages {
    flex: 1;
    padding: 14px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

/* message bubble */
.msg {
    max-width: 70%;
    padding: 10px 12px;
    border-radius: 12px;
    background: var(--panel2);
    border: 1px solid #1f2740;
    transform-origin: left;
    animation: pop 0.15s ease;
}

.msg .user {
    color: var(--accent);
    font-weight: 600;
    margin-right: 6px;
}

.msg.me {
    align-self: flex-end;
    background: #1a2340;
}

@keyframes pop {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* delete animation */
.msg.delete {
    animation: vanish 0.25s ease forwards;
}

@keyframes vanish {
    to {
        opacity: 0;
        transform: translateX(30px) scale(0.9);
    }
}

/* input */
#inputbar {
    display: flex;
    padding: 10px;
    gap: 8px;
    background: var(--panel);
    border-top: 1px solid #1f2740;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #0d1220;
    color: white;
    outline: none;
}

button {
    background: var(--accent);
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
}

/* emoji panel */
#emojiPanel {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-top: 10px;
}

.emoji {
    background: #0d1220;
    border: 1px solid #1f2740;
    border-radius: 10px;
    padding: 8px;
    cursor: pointer;
    text-align: center;
    transition: 0.15s;
}

.emoji:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<div id="sidebar">
    <div id="status">Disconnected</div>
    <div id="emojiPanel"></div>
</div>

<div id="chat">
    <div id="messages"></div>

    <div id="inputbar">
        <input id="input" placeholder="message..." />
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
let ws;
let username = prompt("username?") || "guest";

/* 🔥 auto-connect from same domain */
function getWSUrl() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    return `${proto}://${location.host}/`;
}

function connect() {
    ws = new WebSocket(getWSUrl());

    ws.onopen = () => {
        setStatus("Connected 🟢");
        ws.send(JSON.stringify({ cmd: "emoji_list" }));
    };

    ws.onmessage = (e) => {
        const d = JSON.parse(e.data);

        if (d.cmd === "message_new") {
            addMessage(d.message);
        }

        if (d.cmd === "message_delete") {
            deleteMsg(d.id);
        }

        if (d.cmd === "emoji_list") {
            loadEmojis(d.emojis);
        }

        if (d.cmd === "server_update") {
            setStatus("Connected to " + d.name);
        }
    };

    ws.onclose = () => setStatus("Disconnected 🔴");
}

function setStatus(t) {
    document.getElementById("status").textContent = t;
}

function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    ws.send(JSON.stringify({
        cmd: "message_new",
        channel: "global",
        content: username + ": " + text
    }));

    input.value = "";
}

function addMessage(m) {
    const el = document.createElement("div");
    el.className = "msg";
    el.id = m.id;

    if (m.user === username) el.classList.add("me");

    el.innerHTML = `
        <span class="user">${m.user}</span>
        <span>${m.content}</span>
    `;

    document.getElementById("messages").appendChild(el);
}

function deleteMsg(id) {
    const el = document.getElementById(id);
    if (!el) return;

    el.classList.add("delete");

    setTimeout(() => el.remove(), 250);
}

function loadEmojis(emojis) {
    const panel = document.getElementById("emojiPanel");
    panel.innerHTML = "";

    Object.entries(emojis).forEach(([id, e]) => {
        const b = document.createElement("div");
        b.className = "emoji";
        b.textContent = "😀";
        b.title = e.name;

        b.onclick = () => {
            const input = document.getElementById("input");
            input.value += ` :${e.name}: `;
            input.focus();
        };

        panel.appendChild(b);
    });
}

connect();
</script>

</body>
</html>
