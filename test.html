<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>mpyochats client</title>
<style>
    body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0f1117;
        color: #e6e6e6;
        display: flex;
        height: 100vh;
    }

    #sidebar {
        width: 220px;
        background: #151826;
        padding: 10px;
        display: flex;
        flex-direction: column;
    }

    #chat {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    #messages {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
    }

    .msg {
        padding: 8px;
        margin-bottom: 6px;
        background: #1a1f33;
        border-radius: 8px;
        transition: all 0.25s ease;
    }

    .msg .user {
        font-weight: bold;
        color: #7aa2ff;
    }

    .msg.delete {
        opacity: 0;
        transform: translateX(40px) scale(0.95);
    }

    #inputbar {
        display: flex;
        padding: 10px;
        background: #151826;
        gap: 6px;
    }

    input {
        flex: 1;
        padding: 10px;
        border-radius: 6px;
        border: none;
        background: #0f1117;
        color: white;
    }

    button {
        background: #2a3355;
        border: none;
        color: white;
        padding: 10px;
        border-radius: 6px;
        cursor: pointer;
    }

    #emojiPanel {
        margin-top: 10px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
    }

    .emojiBtn {
        background: #1a1f33;
        border-radius: 6px;
        padding: 6px;
        cursor: pointer;
        text-align: center;
        font-size: 18px;
    }

    #status {
        font-size: 12px;
        opacity: 0.7;
        margin-bottom: 10px;
    }
</style>
</head>
<body>

<div id="sidebar">
    <div id="status">Disconnected</div>
    <button onclick="connect()">Connect</button>
    <div id="emojiPanel"></div>
</div>

<div id="chat">
    <div id="messages"></div>

    <div id="inputbar">
        <input id="msgInput" placeholder="type a message..." />
        <button onclick="sendMsg()">Send</button>
    </div>
</div>

<script>
let ws;
let username = prompt("Username?") || "guest";

const messages = document.getElementById("messages");
const statusEl = document.getElementById("status");
const emojiPanel = document.getElementById("emojiPanel");

function connect() {
    ws = new WebSocket("ws://localhost:8080");

    ws.onopen = () => {
        statusEl.textContent = "Connected 🟢";
        ws.send(JSON.stringify({ cmd: "ping" }));
    };

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        switch (data.cmd) {
            case "message_new":
                renderMessage(data.message);
                break;

            case "message_delete":
                animateDelete(data.id);
                break;

            case "emoji_list":
                loadEmojis(data.emojis);
                break;

            case "server_update":
                statusEl.textContent = "Connected to " + data.name;
                break;

            case "pong":
                console.log("pong");
                break;
        }
    };

    ws.onclose = () => {
        statusEl.textContent = "Disconnected 🔴";
    };
}

function sendMsg() {
    const input = document.getElementById("msgInput");
    const text = input.value.trim();
    if (!text) return;

    ws.send(JSON.stringify({
        cmd: "message_new",
        channel: "global",
        content: username + ": " + text
    }));

    input.value = "";
}

function renderMessage(msg) {
    const div = document.createElement("div");
    div.className = "msg";
    div.id = msg.id;

    div.innerHTML = `
        <span class="user">${msg.user}</span>: 
        <span class="content">${msg.content}</span>
    `;

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function animateDelete(id) {
    const el = document.getElementById(id);
    if (!el) return;

    el.classList.add("delete");

    setTimeout(() => {
        el.remove();
    }, 250);
}

function loadEmojis(emojis) {
    emojiPanel.innerHTML = "";

    Object.entries(emojis).forEach(([id, e]) => {
        const btn = document.createElement("div");
        btn.className = "emojiBtn";

        btn.textContent = "😀";
        btn.title = e.name;

        btn.onclick = () => {
            const input = document.getElementById("msgInput");
            input.value += " :" + e.name + ": ";
            input.focus();
        };

        emojiPanel.appendChild(btn);
    });
}

// auto connect
connect();
</script>

</body>
</html>
