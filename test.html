<!DOCTYPE html>
<html>
<head>
    <title>mpyochats</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 20px auto;
        }

        #messages {
            border: 1px solid #ccc;
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
        }

        input {
            padding: 5px;
        }

        #message {
            width: 70%;
        }
    </style>
</head>
<body>
    <h2>mpyochats</h2>

    <div>
        Username:
        <input id="username" value="Guest">
        Channel:
        <input id="channel" value="general">
        <button onclick="connect()">Connect</button>
    </div>

    <br>

    <div id="messages"></div>

    <input id="message" placeholder="Message">
    <button onclick="sendMessage()">Send</button>

    <script>
        let ws = null;
        let username = "Guest";

        function addMessage(text) {
            const div = document.createElement("div");
            div.textContent = text;
            document.getElementById("messages").appendChild(div);
            document.getElementById("messages").scrollTop =
                document.getElementById("messages").scrollHeight;
        }

        function connect() {
            username = document.getElementById("username").value || "Guest";
            
            ws = new WebSocket(`${window.location.protocol === "https:" ? "wss" : "ws"}://${window.location.host}/`);

            ws.onopen = () => {
                addMessage("[connected]");
            };

            ws.onmessage = (event) => {
                let data;

                try {
                    data = JSON.parse(event.data);
                } catch {
                    return;
                }

                console.log(data);

                if (data.cmd === "message_new") {
                    const msg = data.message;
                    addMessage(`${msg.user}: ${msg.content}`);
                }

                if (data.cmd === "messages_get") {
                    document.getElementById("messages").innerHTML = "";

                    for (const msg of data.messages) {
                        addMessage(`${msg.user}: ${msg.content}`);
                    }
                }
            };

            ws.onclose = () => {
                addMessage("[disconnected]");
            };

            setTimeout(() => {
                ws.send(JSON.stringify({
                    cmd: "messages_get",
                    channel: document.getElementById("channel").value
                }));
            }, 500);
        }

            function sendMessage() {
                if (!ws) return;

                const content = document.getElementById("message").value;
                const channel = document.getElementById("channel").value;
                const username = document.getElementById("username").value || "Guest";

                ws.send(JSON.stringify({
                    cmd: "message_new",
                    channel: channel,
                    user: username,
                    content: content
                }));

                document.getElementById("message").value = "";
            }

            document.getElementById("message").value = "";

        document.getElementById("message").addEventListener("keydown", e => {
            if (e.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
